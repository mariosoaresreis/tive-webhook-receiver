spring:
  application:
    name: tive-webhook-receiver

  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tive}}
    username: ${DB_USER:tive}
    password: ${DB_PASSWORD:tive}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      # Exactly-once: each message has a unique ID; broker rejects duplicates
      acks: all
      enable-idempotence: true
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 1
        delivery.timeout.ms: 30000
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.shiptrack.tive.model"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: ${PORT:8080}

# Tive secrets (injected via environment variables in production)
tive:
  webhook:
    # Header sent by Tive for authentication: X-Tive-Client-Id
    client-id: ${TIVE_CLIENT_ID:my-client-id}
    # Expected value of the X-Tive-Client-Secret header
    client-secret: ${TIVE_CLIENT_SECRET:my-client-secret}
    # Idempotency key TTL in Redis (seconds)
    idempotency-ttl-seconds: 86400
  position-state:
    consumer-group: ${TIVE_POSITION_STATE_CONSUMER_GROUP:tive-position-state}
  alert-persistence:
    enabled: ${TIVE_ALERT_PERSISTENCE_ENABLED:true}
    consumer-group: ${TIVE_ALERT_PERSISTENCE_CONSUMER_GROUP:tive-alert-persistence}

kafka:
  topics:
    positions: tive.positions
    alerts: tive.alerts
    sensors: tive.sensors
    dlq: tive.dlq

# Metrics exposed for Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"
