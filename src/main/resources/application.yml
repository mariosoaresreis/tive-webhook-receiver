spring:
  application:
    name: tive-webhook-receiver

  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tive}}
    username: ${DB_USER:tive}
    password: ${DB_PASSWORD:tive}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      # Exactly-once: each message has a unique ID; broker rejects duplicates
      acks: all
      enable-idempotence: true
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 1
        delivery.timeout.ms: 30000
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.shiptrack.tive.model"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: ${PORT:8080}

# Tive secrets (injected via environment variables in production)
tive:
  webhook:
    # Header sent by Tive for authentication: X-Tive-Client-Id
    client-id: ${TIVE_CLIENT_ID:my-client-id}
    # Expected value of the X-Tive-Client-Secret header
    client-secret: ${TIVE_CLIENT_SECRET:my-client-secret}
    # Idempotency key TTL in Redis (seconds)
    idempotency-ttl-seconds: 86400
  recovery:
    enabled: ${TIVE_RECOVERY_ENABLED:false}
    fixed-delay: ${TIVE_RECOVERY_FIXED_DELAY:PT5M}
    initial-delay: ${TIVE_RECOVERY_INITIAL_DELAY:PT1M}
    lookback: ${TIVE_RECOVERY_LOOKBACK:PT15M}
    safety-overlap: ${TIVE_RECOVERY_SAFETY_OVERLAP:PT2M}
    lock-ttl: ${TIVE_RECOVERY_LOCK_TTL:PT4M}
    base-url: ${TIVE_RECOVERY_BASE_URL:}
    client-id: ${TIVE_RECOVERY_CLIENT_ID:${TIVE_CLIENT_ID:my-client-id}}
    client-secret: ${TIVE_RECOVERY_CLIENT_SECRET:${TIVE_CLIENT_SECRET:my-client-secret}}
    from-parameter: ${TIVE_RECOVERY_FROM_PARAMETER:from}
    to-parameter: ${TIVE_RECOVERY_TO_PARAMETER:to}
    page-parameter: ${TIVE_RECOVERY_PAGE_PARAMETER:page}
    page-size-parameter: ${TIVE_RECOVERY_PAGE_SIZE_PARAMETER:pageSize}
    page-size: ${TIVE_RECOVERY_PAGE_SIZE:500}
    max-pages: ${TIVE_RECOVERY_MAX_PAGES:20}
    positions:
      enabled: ${TIVE_RECOVERY_POSITIONS_ENABLED:true}
      # Configure the exact Tive REST API path used to recover missed position events.
      path: ${TIVE_RECOVERY_POSITIONS_PATH:}
      response-items-field: ${TIVE_RECOVERY_POSITIONS_RESPONSE_ITEMS_FIELD:}
    alerts:
      enabled: ${TIVE_RECOVERY_ALERTS_ENABLED:true}
      # Configure the exact Tive REST API path used to recover missed alert events.
      path: ${TIVE_RECOVERY_ALERTS_PATH:}
      response-items-field: ${TIVE_RECOVERY_ALERTS_RESPONSE_ITEMS_FIELD:}
  alert-persistence:
    enabled: ${TIVE_ALERT_PERSISTENCE_ENABLED:true}
    consumer-group: ${TIVE_ALERT_PERSISTENCE_CONSUMER_GROUP:tive-alert-persistence}

kafka:
  topics:
    positions: tive.positions
    alerts: tive.alerts
    sensors: tive.sensors
    dlq: tive.dlq

# Metrics exposed for Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"
